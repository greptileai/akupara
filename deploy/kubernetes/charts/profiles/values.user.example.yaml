# Copy to values.user.yaml and fill in required values.

global:
  registry: "REPLACE_ME_REGISTRY"
  tag: "REPLACE_ME_TAG"

network:
  appUrl: "https://greptile.example.com"
  webhookUrl: "https://greptile.example.com/webhook"

hatchet:
  apiUrl: "http://hatchet-stack-api.default.svc.cluster.local:8080"
  grpcUrl: "hatchet-stack-engine.default.svc.cluster.local:7070"
  tlsStrategy: "none"

github:
  appId: "0"
  appUrl: "https://github.com/apps/REPLACE_ME"
  enterpriseUrl: "https://github.example.com"
  enterpriseAppUrl: "https://github.example.com/apps/REPLACE_ME"
  enterpriseAppId: "0"

# PgBouncer is enabled by default in chart values.
# Optional: disable if you want direct DB connections only.
# pgbouncer:
#   enabled: false

email:
  # Leave empty to disable external email delivery (noop provider).
  provider: ""
  from: "email@domain.com"
  support: "support@example.com"
  smtp:
    host: "smtp.example.com"
    port: "587"
    user: "smtp_username"
    secure: "false"
    tls: "true"
    rejectUnauthorized: "true"

secrets:
  mode: native
  native:
    # Auto-generated by ./scripts/init-values.sh if left as-is.
    JWT_SECRET: "REPLACE_ME"
    # Auto-generated by ./scripts/init-values.sh. Must be exactly 32 chars.
    TOKEN_ENCRYPTION_KEY: "REPLACE_ME_32_CHARACTERS_LONG_KEY"

    # Auto-generated by ./scripts/init-values.sh when Hatchet is already deployed.
    HATCHET_CLIENT_TOKEN: "REPLACE_ME"

    # Auto-generated by ./scripts/init-values.sh if left as-is.
    LITELLM_MASTER_KEY: "REPLACE_ME"

    # Required for llmproxy model calls.
    ANTHROPIC_KEY: "REPLACE_ME"

    # Required for GitHub integration + webhook handling.
    GITHUB_WEBHOOK_SECRET: "REPLACE_ME"
    WEBHOOK_SECRET: "REPLACE_ME"
    GITHUB_PRIVATE_KEY: "REPLACE_ME"
    GITHUB_CLIENT_ID: "REPLACE_ME"
    GITHUB_CLIENT_SECRET: "REPLACE_ME"

    # Optional: only required when email.provider=SMTP.
    # SMTP_PASSWORD: "REPLACE_ME"

    # Optional: uncomment if you route through OpenAI/Azure/Bedrock via llmproxy config.
    # OPENAI_KEY: ""
    # AZURE_OPENAI_KEY: ""
    # AWS_ACCESS_KEY_ID: ""
    # AWS_SECRET_ACCESS_KEY: ""

    # Optional: only required if BILLING/BILLING_ENABLED is true.
    # STRIPE_SECRET_KEY: ""

    # Optional: only required if ANALYTICS is true.
    # POSTHOG_KEY: ""

ingress:
  enabled: true
  className: nginx
  web:
    enabled: true
    # Optional: defaults to hostname/path from network.appUrl.
    host: ""
    path: ""
    tls:
      enabled: true
      secretName: greptile-web-tls
  webhook:
    enabled: true
    # Optional: defaults to hostname/path from network.webhookUrl.
    host: ""
    path: ""
    tls:
      enabled: true
      secretName: greptile-webhook-tls

# Optional: use managed Postgres instead of bundled Postgres chart.
# postgres:
#   enabled: false
# externalDatabase:
#   host: "REPLACE_ME"
#   port: 5432
#   user: "REPLACE_ME"
#   password: "REPLACE_ME"
#   database: "REPLACE_ME"
#   vectorDatabase: "vector"
#   sslDisable: "false"
