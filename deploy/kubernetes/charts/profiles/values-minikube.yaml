global:
  registry: "600000000000.dkr.ecr.us-east-1.amazonaws.com/greptile"
  tag: "grep-tag-x.x.x"
  pullPolicy: Never

network:
  appUrl: "http://$(minikube ip):30000"
  webhookUrl: "http://$(minikube ip):30007/webhook"

postgres:
  enabled: true
  primary:
    persistence:
      size: 10Gi
      storageClass: standard

storage:
  sharedWorkdir:
    size: 20Gi
    storageClass: standard

ingress:
  enabled: false

components:
  web:
    service:
      enabled: true
      type: NodePort
      port: 3000
  webhook:
    service:
      enabled: true
      type: NodePort
      port: 3007

secrets:
  mode: native
  native:
    JWT_SECRET: "minikube-jwt"
    TOKEN_ENCRYPTION_KEY: "minikube-token-key"
    LITELLM_MASTER_KEY: "sk-minikube-litellm"
    HATCHET_CLIENT_TOKEN: ""
