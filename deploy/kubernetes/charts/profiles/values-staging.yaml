global:
  registry: "your-registry.example.com/greptile"
  tag: "vX.Y.Z-rc"
  imagePullSecrets:
    - name: regcred

network:
  appUrl: "https://staging.greptile.example.com"
  webhookUrl: "https://staging.greptile.example.com/webhook"

ingress:
  enabled: true
  className: nginx
  web:
    host: staging.greptile.example.com
    tls:
      enabled: true
      secretName: greptile-staging-tls
  webhook:
    host: staging.greptile.example.com
    path: /webhook
    tls:
      enabled: true
      secretName: greptile-staging-tls

components:
  chunker:
    replicas: 1
  summarizer:
    replicas: 1
  worker:
    replicas: 1
