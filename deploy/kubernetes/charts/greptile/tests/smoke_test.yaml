apiVersion: v1
kind: Pod
metadata:
  name: "{{ include \"greptile.fullname\" . }}-smoke"
  labels:
    {{- include "greptile.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - sh
        - -c
        - "wget -qO- http://{{ include \"greptile.componentName\" (dict \"root\" . \"name\" \"web\") }}:{{ .Values.components.web.service.port }}/ >/dev/null"
