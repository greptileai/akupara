{{- if .Values.pgbouncer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "greptile.pgbouncerName" . }}
  labels:
    {{- include "greptile.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
spec:
  replicas: {{ .Values.pgbouncer.replicas }}
  selector:
    matchLabels:
      {{- include "greptile.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pgbouncer
  template:
    metadata:
      labels:
        {{- include "greptile.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pgbouncer
      {{- with .Values.global.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "greptile.serviceAccountName" . }}
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- with .Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pgbouncer
          image: {{ include "greptile.image" (dict "root" . "repository" .Values.pgbouncer.image.repository "tag" .Values.pgbouncer.image.tag) }}
          imagePullPolicy: {{ default .Values.global.pullPolicy .Values.pgbouncer.image.pullPolicy }}
          {{- with .Values.global.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: pgbouncer
              containerPort: {{ .Values.pgbouncer.containerPort }}
              protocol: TCP
          env:
            - name: DB_HOST
              value: {{ include "greptile.databaseHost" . | quote }}
            - name: DB_PORT
              value: {{ include "greptile.databasePort" . | quote }}
            - name: DB_USER
              value: {{ include "greptile.databaseUser" . | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "greptile.secretName" . }}
                  key: DB_PASSWORD
            - name: POOL_MODE
              value: {{ .Values.pgbouncer.config.poolMode | quote }}
            - name: MAX_CLIENT_CONN
              value: {{ .Values.pgbouncer.config.maxClientConn | quote }}
            - name: DEFAULT_POOL_SIZE
              value: {{ .Values.pgbouncer.config.defaultPoolSize | quote }}
            - name: RESERVE_POOL_SIZE
              value: {{ .Values.pgbouncer.config.reservePoolSize | quote }}
            - name: AUTH_TYPE
              value: {{ .Values.pgbouncer.config.authType | quote }}
            - name: QUERY_WAIT_TIMEOUT
              value: {{ .Values.pgbouncer.config.queryWaitTimeout | quote }}
            - name: CLIENT_IDLE_TIMEOUT
              value: {{ .Values.pgbouncer.config.clientIdleTimeout | quote }}
            - name: SERVER_IDLE_TIMEOUT
              value: {{ .Values.pgbouncer.config.serverIdleTimeout | quote }}
            - name: SERVER_CONNECT_TIMEOUT
              value: {{ .Values.pgbouncer.config.serverConnectTimeout | quote }}
            - name: SERVER_LOGIN_RETRY
              value: {{ .Values.pgbouncer.config.serverLoginRetry | quote }}
          livenessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
{{- end }}
