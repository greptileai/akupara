{{- if .Values.storage.sharedWorkdir.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "greptile.sharedPvcName" . }}
  labels:
    {{- include "greptile.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.storage.sharedWorkdir.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.storage.sharedWorkdir.size }}
  {{- if .Values.storage.sharedWorkdir.storageClass }}
  storageClassName: {{ .Values.storage.sharedWorkdir.storageClass }}
  {{- end }}
{{- end }}
