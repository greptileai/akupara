{{- if eq .Values.secrets.mode "external" }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "greptile.secretName" . }}
  labels:
    {{- include "greptile.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.external.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secrets.external.secretStoreRef.name }}
    kind: {{ .Values.secrets.external.secretStoreRef.kind }}
  target:
    name: {{ include "greptile.secretName" . }}
    creationPolicy: Owner
  data:
    {{- toYaml .Values.secrets.external.data | nindent 4 }}
{{- end }}
