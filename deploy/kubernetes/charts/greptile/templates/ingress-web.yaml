{{- if and .Values.ingress.enabled .Values.ingress.web.enabled .Values.components.web.enabled .Values.components.web.service.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "greptile.fullname" . }}-web
  labels:
    {{- include "greptile.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.web.host }}
      http:
        paths:
          - path: {{ .Values.ingress.web.path }}
            pathType: {{ .Values.ingress.web.pathType }}
            backend:
              service:
                name: {{ include "greptile.componentName" (dict "root" . "name" "web") }}
                port:
                  number: {{ .Values.components.web.service.port }}
  {{- if .Values.ingress.web.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.web.host }}
      secretName: {{ .Values.ingress.web.tls.secretName }}
  {{- end }}
{{- end }}
