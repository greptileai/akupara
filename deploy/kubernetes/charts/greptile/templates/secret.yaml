{{- if eq .Values.secrets.mode "native" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "greptile.secretName" . }}
  labels:
    {{- include "greptile.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "greptile.databasePooledUrl" . | quote }}
  DIRECT_URL: {{ include "greptile.databaseUrl" . | quote }}
  VECTOR_DB_URL: {{ include "greptile.vectorDatabaseUrl" . | quote }}
  DB_PASSWORD: {{ include "greptile.databasePassword" . | quote }}
  VECTOR_DB_PASSWORD: {{ include "greptile.databasePassword" . | quote }}

  JWT_SECRET: {{ .Values.secrets.native.JWT_SECRET | quote }}
  TOKEN_ENCRYPTION_KEY: {{ .Values.secrets.native.TOKEN_ENCRYPTION_KEY | quote }}
  LITELLM_MASTER_KEY: {{ .Values.secrets.native.LITELLM_MASTER_KEY | quote }}
  LLM_PROXY_KEY: {{ .Values.secrets.native.LITELLM_MASTER_KEY | quote }}
  HATCHET_CLIENT_TOKEN: {{ .Values.secrets.native.HATCHET_CLIENT_TOKEN | quote }}
  DB_URL: {{ include "greptile.databaseUrl" . | quote }}

  WEBHOOK_SECRET: {{ .Values.secrets.native.WEBHOOK_SECRET | quote }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.secrets.native.GITHUB_WEBHOOK_SECRET | quote }}
  GITHUB_PRIVATE_KEY: {{ .Values.secrets.native.GITHUB_PRIVATE_KEY | quote }}
  GITHUB_ENTERPRISE_APP_PRIVATE_KEY: {{ .Values.secrets.native.GITHUB_PRIVATE_KEY | quote }}
  GITHUB_CLIENT_ID: {{ .Values.secrets.native.GITHUB_CLIENT_ID | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.native.GITHUB_CLIENT_SECRET | quote }}
  GITHUB_ENTERPRISE_CLIENT_ID: {{ .Values.secrets.native.GITHUB_ENTERPRISE_CLIENT_ID | quote }}
  GITHUB_ENTERPRISE_CLIENT_SECRET: {{ .Values.secrets.native.GITHUB_ENTERPRISE_CLIENT_SECRET | quote }}
  AUTH_GITHUB_ID: {{ .Values.secrets.native.AUTH_GITHUB_ID | quote }}
  AUTH_GITHUB_SECRET: {{ .Values.secrets.native.AUTH_GITHUB_SECRET | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.native.SMTP_PASSWORD | quote }}

  ANTHROPIC_KEY: {{ .Values.secrets.native.ANTHROPIC_KEY | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.native.ANTHROPIC_KEY | quote }}
  OPENAI_KEY: {{ .Values.secrets.native.OPENAI_KEY | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.native.OPENAI_KEY | quote }}
  AZURE_OPENAI_KEY: {{ .Values.secrets.native.AZURE_OPENAI_KEY | quote }}
  AZURE_OPENAI_API_KEY: {{ .Values.secrets.native.AZURE_OPENAI_KEY | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.native.AWS_ACCESS_KEY_ID | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.native.AWS_SECRET_ACCESS_KEY | quote }}

  AUTH_BOXYHQ_API_KEY: {{ .Values.secrets.native.AUTH_BOXYHQ_API_KEY | quote }}
  AUTH_BOXYHQ_SAML_ID: {{ .Values.secrets.native.AUTH_BOXYHQ_SAML_ID | quote }}
  AUTH_BOXYHQ_SAML_SECRET: {{ .Values.secrets.native.AUTH_BOXYHQ_SAML_SECRET | quote }}
  JACKSON_DB_ENCRYPTION_KEY: {{ .Values.secrets.native.JACKSON_DB_ENCRYPTION_KEY | quote }}
  JACKSON_ADMIN_CREDENTIALS: {{ .Values.secrets.native.JACKSON_ADMIN_CREDENTIALS | quote }}
  JACKSON_PUBLIC_KEY: {{ .Values.secrets.native.JACKSON_PUBLIC_KEY | quote }}
  JACKSON_PRIVATE_KEY: {{ .Values.secrets.native.JACKSON_PRIVATE_KEY | quote }}
{{- end }}
