{{- if and .Values.ingress.enabled .Values.ingress.webhook.enabled .Values.components.webhook.enabled .Values.components.webhook.service.enabled }}
{{- $webhookHost := regexFind "^[^/]+" (regexReplaceAll "^https?://" .Values.network.webhookUrl "") -}}
{{- $webhookPathRaw := regexReplaceAll "^https?://[^/]+" .Values.network.webhookUrl "" -}}
{{- $webhookPath := default "/webhook" $webhookPathRaw -}}
{{- $host := default $webhookHost .Values.ingress.webhook.host -}}
{{- $path := default $webhookPath .Values.ingress.webhook.path -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "greptile.fullname" . }}-webhook
  labels:
    {{- include "greptile.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: {{ $path | quote }}
            pathType: {{ .Values.ingress.webhook.pathType }}
            backend:
              service:
                name: {{ include "greptile.componentName" (dict "root" . "name" "webhook") }}
                port:
                  number: {{ .Values.components.webhook.service.port }}
  {{- if .Values.ingress.webhook.tls.enabled }}
  tls:
    - hosts:
        - {{ $host | quote }}
      secretName: {{ .Values.ingress.webhook.tls.secretName }}
  {{- end }}
{{- end }}
